{% extends 'base.html' %}
{% block title %}Delete “{{ skill.title }}”?{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="zine-panel text-center">
      <span class="eyebrow" style="background:#b6230f;">Heads up</span>
      <h1 class="mt-3">Delete “{{ skill.title }}”?</h1>
      <p class="text-muted">This is permanent. Once deleted, the post can't be recovered.</p>

      <form method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a class="btn btn-outline-ink ms-2" href="{% url 'skill_detail' skill.pk %}">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
